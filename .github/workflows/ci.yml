# This workflow runs every time something push to GitHub.
# It verifies that a Docker image builds successfully.

name: CI - Build & Verify

# When to run this workflow
on:
  push:
    branches: [main]     # Run when pushing to main branch
  pull_request:
    branches: [main]     # Run when opening a PR to main branch

jobs:
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest    # GitHub provides a free Linux server

    steps:
      # Step 1: Download your code onto the GitHub server
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Build the Docker image (same as "docker compose build")
      - name: Build Docker image
        run: docker build -t rag-backend .

      # Step 3: Start PostgreSQL + Backend and verify they connect
      - name: Start services
        run: |
          # Create a minimal .env file for testing
          echo "GROQ_API_KEY=test_key" > .env
          echo "TAVILY_API_KEY=test_key" >> .env
          docker compose up -d
          
      # Step 4: Wait for services to be ready
      - name: Wait for services
        run: |
          echo "Waiting for services to start..."
          sleep 30
          
      # Step 5: Check that the backend is responding
      - name: Health check
        run: |
          curl --fail http://localhost:8000/ || exit 1
          echo "Backend is healthy!"

      # Step 6: Clean up
      - name: Stop services
        if: always()
        run: docker compose down -v

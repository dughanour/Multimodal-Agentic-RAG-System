# This workflow runs every time something push to GitHub.
# It verifies that a Docker image builds successfully and deploys it to AWS EC2.

name: CI/CD - Build & Deploy

# When to run this workflow
on:
    push:
        branches: [main]     # Run when pushing to main branch
    pull_request:
        branches: [main]     # Run when opening a PR to main branch

jobs:
    CI:
        name: Build and Push Docker image
        runs-on: ubuntu-latest    # GitHub provides a free Linux server

        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            
            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v4
              with:
                aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                aws-region: ${{ secrets.AWS_REGION }}
            
            - name: Login to Amazon ECR
              id: login-ecr
              uses: aws-actions/amazon-ecr-login@v2
            
            - name: Build, tag, and push Docker image to ECR
              env:
                ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
                ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY_NAME }}
                IMAGE_TAG: latest
              run: |
                docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
                docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

    CD:
        name: Deploy Docker image to AWS EC2
        needs: CI               # This job only runs after the CI job has finished
        runs-on: self-hosted    # Run on the EC2 instance (the self-hosted runner that set up)

        steps:
            - name: Checkout code                # Download code onto the EC2
              uses: actions/checkout@v4
            
            - name: Configure AWS credentials    # Configure AWS credentials to access the ECR repository
              uses: aws-actions/configure-aws-credentials@v4
              with:
                aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                aws-region: ${{ secrets.AWS_REGION }}
            
            - name: Login to Amazon ECR
              id: login-ecr
              uses: aws-actions/amazon-ecr-login@v2
            
            - name: Pull Docker image from ECR    # Download the Docker image that CI just built and pushed to the ECR repository
              env:
                ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
                ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY_NAME }}
                IMAGE_TAG: latest
              run: |
                docker pull $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
            
            - name: Stop old Docker container
              run: |
                docker compose down || true
            
            - name: Start new Docker container
              env:
                ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
                ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY_NAME }}
                IMAGE_TAG: latest
              run: |
                export IMAGE_NAME=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
                docker compose up -d